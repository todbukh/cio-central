{% extends 'exec_panel/executive-base.html' %}

{% block title %}Manage Organization{% endblock %}

{% block tab %}
    <div class="container py-4">
        <div class="d-flex flex-row flex-grow-1 flex-shrink-1 justify-content-between align-items-center mb-5">
            <h3>Manage Organization</h3>
            <a href="{% url 'exec_panel:organization-edit:edit' %}" class="btn btn-outline-info"
               title="Edit Organization">
                <i class="bi bi-pencil-square"></i> Edit Organization
            </a>
        </div>
        <h5>Organization Image:</h5>
        {% if organization.organization_picture %}
            <img src="{{ organization.organization_picture.url }}"
                 width=200 height=200 alt="Organization Image" class="mb-3">
        {% else %}
            <img src="https://placehold.co/200x200?text=My+Organization"
                 width=200 height=200 alt="Organization Image" class="mb-3">
        {% endif %}
        <h5 class="text-body">Name:</h5>
        <h5 class="text-primary ">{{ organization.name }}</h5>
    </div>
{% endblock %}
