{% extends 'base.html' %}

{% block title %}{{ event.name }} - CIO Central{% endblock %}

{% block content %}
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="{% url 'organization:messages' 'announcements' %}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back to Announcements
            </a>
        </div>

        <h3 class="text-body fw-bold mb-0 text-center text-break">{{ event.name }}</h3>

        <div class="bg-body-secondary rounded p-4 mx-auto mt-3" style="max-width: 900px;">
            <p class="text-body-secondary mb-1">
                <i class="bi bi-calendar-event me-1"></i>{{ event.date }}
            </p>
            {% if event.location %}
            <p class="text-body-secondary mb-4 text-break">
                <i class="bi bi-geo-alt me-1"></i>{{ event.location }}
            </p>
            {% else %}
            <p class="mb-4"></p>
            {% endif %}

            <h6 class="text-body-secondary text-uppercase mb-2">Description</h6>
            <p class="text-body text-break">{{ event.description }}</p>
        </div>
    </div>
{% endblock %}
