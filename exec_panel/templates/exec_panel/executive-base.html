{% extends 'base.html' %}

{% block title %}Executive Panel - CIO Central{% endblock %}

{% block content %}
    <div class="mx-3 mt-3 d-flex flex-column gap-3 align-items-start">

        <div class="d-flex flex-row gap-3 align-items-center">
            <a href="/" class="btn btn-outline-primary">
              <i class="bi bi-arrow-left"></i> Home
            </a>

            <h1>Executive Panel</h1>
        </div>


        {# The styling of this tab was generated by Gemini 3.1 Pro #}
        <nav class="d-flex d-md-inline-flex flex-column flex-md-row align-self-stretch align-self-md-start p-2 bg-body-tertiary rounded-4 gap-2" aria-label="Section navigation">
            <a href="{% url "exec_panel:events:events" %}" class="btn {% if active_tab == "events" %}bg-body shadow-sm text-body{% else %}text-body-secondary{% endif %} border-0 px-4 px-lg-5 py-2 fs-5 fw-medium rounded-3">Events</a>
            <a href="{% url "exec_panel:attendance:attendance" %}" class="btn {% if active_tab == "attendance" %}bg-body shadow-sm text-body{% else %}text-body-secondary{% endif %} border-0 px-4 px-lg-5 py-2 fs-5 fw-medium rounded-3">Attendance</a>
            <a href="{% url "exec_panel:analytics:analytics" %}" class="btn {% if active_tab == "analytics" %}bg-body shadow-sm text-body{% else %}text-body-secondary{% endif %} border-0 px-4 px-lg-5 py-2 fs-5 fw-medium rounded-3">Analytics</a>
            <a href="{% url "exec_panel:roster:roster" %}" class="btn {% if active_tab == "roster" %}bg-body shadow-sm text-body{% else %}text-body-secondary{% endif %} border-0 px-4 px-lg-5 py-2 fs-5 fw-medium rounded-3">Roster</a>
        </nav>

        {% block tab %}
        {% endblock %}
    </div>
{% endblock %}
