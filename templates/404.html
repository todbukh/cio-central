{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    .space-void {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        cursor: default;
    }

    /* ── stars ── */
    .star {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        animation: twinkle ease-in-out infinite alternate;
    }

    @keyframes twinkle {
        0%   { opacity: 0.1; transform: scale(0.7); }
        100% { opacity: 0.6; transform: scale(1.3); }
    }

    /* ── background floating digits ── */
    .bg-digit {
        position: absolute;
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        opacity: 0.05;
        pointer-events: none;
        user-select: none;
        animation: drift linear infinite;
    }

    @keyframes drift {
        0%   { transform: translateY(0)    rotate(0deg)   scale(1);    }
        25%  { transform: translateY(-28px) rotate(4deg)   scale(1.03); }
        50%  { transform: translateY(-10px) rotate(-3deg)  scale(0.97); }
        75%  { transform: translateY(-36px) rotate(3deg)   scale(1.02); }
        100% { transform: translateY(0)    rotate(0deg)   scale(1);    }
    }

    /* ── draggable floaters ── */
    .floater {
        position: absolute;
        cursor: grab;
        user-select: none;
        touch-action: none;
        z-index: 20;
        transition: filter 0.2s ease;
    }

    .floater:hover { filter: brightness(1.25); }

    .floater.dragging {
        cursor: grabbing;
        filter: brightness(1.4);
    }

    .floater-digit {
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        font-size: clamp(5rem, 14vw, 11rem);
        line-height: 1;
    }

    .floater-btn { white-space: nowrap; }

    /* ── sarcastic message ── */
    .floater-msg {
        font-family: 'Space Mono', monospace;
        font-size: clamp(0.65rem, 1.4vw, 0.85rem);
        max-width: 280px;
        text-align: center;
        line-height: 1.7;
        letter-spacing: 0.02em;
        padding: 0.9rem 1.1rem;
        border-radius: 0.75rem;
        border: 1px solid;
    }

    /* ── basketball ── */
    .floater-ball {
        width: 56px;
        height: 56px;
        font-size: 48px;
        line-height: 56px;
        text-align: center;
        z-index: 25;
        filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    .floater-ball.dragging {
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)) brightness(1.1);
    }

    /* ── hoop ── */
    .floater-hoop {
        z-index: 22;
        pointer-events: none;
        cursor: default;
    }

    .hoop-assembly {
        position: relative;
        width: 140px;
        height: 170px;
    }

    /* backboard */
    .hoop-backboard {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 68px;
        border: 3px solid;
        border-radius: 4px;
    }

    /* backboard inner square target */
    .hoop-backboard-inner {
        position: absolute;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 30px;
        border: 2px solid;
        border-radius: 2px;
        opacity: 0.5;
    }

    /* bracket connecting backboard to rim */
    .hoop-bracket {
        position: absolute;
        top: 68px;
        left: 50%;
        transform: translateX(-50%);
        width: 4px;
        height: 8px;
    }

    /* rim — oval ring */
    .hoop-rim {
        position: absolute;
        top: 72px;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 16px;
        border: 4px solid;
        border-radius: 50%;
    }

    /* net — layered trapezoid lines */
    .hoop-net {
        position: absolute;
        top: 86px;
        left: 50%;
        transform: translateX(-50%);
    }

    .hoop-net-line {
        border-bottom: 2px dashed;
        opacity: 0.3;
        position: absolute;
    }

    .hoop-net-line:nth-child(1) { width: 72px; left: -36px; top: 0; }
    .hoop-net-line:nth-child(2) { width: 62px; left: -31px; top: 12px; }
    .hoop-net-line:nth-child(3) { width: 50px; left: -25px; top: 24px; }
    .hoop-net-line:nth-child(4) { width: 36px; left: -18px; top: 36px; }
    .hoop-net-line:nth-child(5) { width: 22px; left: -11px; top: 48px; }

    .hoop-net-side {
        position: absolute;
        top: 0;
        height: 55px;
        border-left: 2px dashed;
        opacity: 0.25;
    }

    .hoop-net-side.left-side  { left: -36px; transform: rotate(8deg);  transform-origin: top center; }
    .hoop-net-side.right-side { left: 34px;  transform: rotate(-8deg); transform-origin: top center; }
    .hoop-net-side.left-inner  { left: -18px; transform: rotate(4deg);  transform-origin: top center; }
    .hoop-net-side.right-inner { left: 16px;  transform: rotate(-4deg); transform-origin: top center; }

    /* ── scoreboard ── */
    .scoreboard {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        font-family: 'Space Mono', monospace;
        text-align: center;
        padding: 0.6rem 1.2rem;
        border-radius: 0.75rem;
        border: 1px solid;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.6s ease;
    }

    .scoreboard.visible { opacity: 1; }

    .scoreboard .score-label {
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
    }

    .scoreboard .score-value {
        font-size: 1.8rem;
        font-weight: 700;
        line-height: 1;
    }

    /* ── score flash ── */
    .score-flash {
        position: fixed;
        z-index: 200;
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        font-size: 2.2rem;
        pointer-events: none;
        animation: flashUp 1s ease-out forwards;
    }

    @keyframes flashUp {
        0%   { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-70px) scale(1.5); }
    }
</style>

    <div class="score-value" id="score-value">0</div>

<script>
(function () {
    var arena = document.getElementById('void');
    var floaters = Array.from(arena.querySelectorAll('[data-floater]'));
    var scoreboard = document.getElementById('scoreboard');
    var scoreDisplay = document.getElementById('score-value');

    /* identify special floaters by index */
    var ballIndex = -1;
    var hoopIndex = -1;
    floaters.forEach(function (el, i) {
        if (el.hasAttribute('data-ball')) ballIndex = i;
        if (el.hasAttribute('data-hoop')) hoopIndex = i;
    });

    var score = 0;
    var scoreCooldown = false;

    /* ── physics state ── */
    var state = floaters.map(function (el) {
        var isHoop = el.hasAttribute('data-hoop');
        var isBall = el.hasAttribute('data-ball');
        return {
            x: 0, y: 0,
            vx: (Math.random() - 0.5) * (isHoop ? 0.2 : isBall ? 0 : 0.6),
            vy: isBall ? 0 : (Math.random() - 0.5) * (isHoop ? 0.2 : 0.6),
            dragging: false,
            dragOffsetX: 0, dragOffsetY: 0,
            lastMouse: { x: 0, y: 0 },
            prevMouse: { x: 0, y: 0 },
            isHoop: isHoop,
            isBall: isBall
        };
    });

    /* ── placement slots ── */
    function initPositions() {
        var aw = arena.clientWidth;
        var ah = arena.clientHeight;
        var slots = [
            { xr: 0.15, yr: 0.34 },   /* 4           */
            { xr: 0.38, yr: 0.31 },   /* 0           */
            { xr: 0.61, yr: 0.34 },   /* 4           */
            { xr: 0.40, yr: 0.55 },   /* message     */
            { xr: 0.30, yr: 0.80 },   /* go home btn */
            { xr: 0.72, yr: 0.22 },   /* hoop        */
            { xr: 0.72, yr: 0.60 },   /* ball        */
        ];
        floaters.forEach(function (el, i) {
            if (i < slots.length) {
                state[i].x = slots[i].xr * aw - el.offsetWidth / 2;
                state[i].y = slots[i].yr * ah - el.offsetHeight / 2;
            }
        });
    }

    initPositions();

    /* ── pointer helpers ── */
    function getPointer(e) {
        if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
    }

    function onDown(e, i) {
        if (floaters[i].hasAttribute('data-hoop')) return;
        if (e.type === 'mousedown') e.preventDefault();

        var p = getPointer(e);
        var rect = arena.getBoundingClientRect();
        var s = state[i];

        s.dragging = true;
        s.dragOffsetX = p.x - rect.left - s.x;
        s.dragOffsetY = p.y - rect.top - s.y;
        s.lastMouse = { x: p.x, y: p.y };
        s.prevMouse = { x: p.x, y: p.y };
        s.vx = 0;
        s.vy = 0;

        floaters[i].classList.add('dragging');
    }

    function onMove(e) {
        var p = getPointer(e);
        var rect = arena.getBoundingClientRect();

        state.forEach(function (s) {
            if (!s.dragging) return;
            s.prevMouse = { x: s.lastMouse.x, y: s.lastMouse.y };
            s.lastMouse = { x: p.x, y: p.y };
            s.x = p.x - rect.left - s.dragOffsetX;
            s.y = p.y - rect.top - s.dragOffsetY;
        });
    }

    function onUp() {
        state.forEach(function (s, i) {
            if (!s.dragging) return;
            s.dragging = false;
            floaters[i].classList.remove('dragging');
            s.vx = (s.lastMouse.x - s.prevMouse.x) * 0.35;
            s.vy = (s.lastMouse.y - s.prevMouse.y) * 0.35;
        });
    }

    floaters.forEach(function (el, i) {
        el.addEventListener('mousedown', function (e) { onDown(e, i); });
        el.addEventListener('touchstart', function (e) { onDown(e, i); }, { passive: true });
    });

    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);

    /* prevent anchor click when dragging */
    floaters.forEach(function (el) {
        if (el.tagName === 'A') {
            var sx = 0, sy = 0;
            el.addEventListener('mousedown', function (e) { sx = e.clientX; sy = e.clientY; });
            el.addEventListener('click', function (e) {
                if (Math.hypot(e.clientX - sx, e.clientY - sy) > 6) e.preventDefault();
            });
        }
    });

    /* ── score flash ── */
    function showScoreFlash(x, y) {
        var el = document.createElement('div');
        el.className = 'score-flash text-success';
        el.textContent = '+1';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        document.body.appendChild(el);
        setTimeout(function () { el.remove(); }, 1000);
    }

    /* ── hoop scoring ── */
    /* ball must cross the rim plane moving downward, within the rim width */
    var ballWasAboveRim = false;

    function checkScore() {
        if (ballIndex < 0 || hoopIndex < 0 || scoreCooldown) return;

        var bs = state[ballIndex];
        var hs = state[hoopIndex];
        var ball = floaters[ballIndex];
        var hoop = floaters[hoopIndex];

        if (bs.dragging) { ballWasAboveRim = false; return; }

        var bcx = bs.x + ball.offsetWidth / 2;
        var bcy = bs.y + ball.offsetHeight / 2;

        /* rim center — matches the .hoop-rim position in the assembly */
        var rimCx = hs.x + hoop.offsetWidth / 2;
        var rimY  = hs.y + 80;
        var rimHalfW = 36;

        var inRimX = Math.abs(bcx - rimCx) < rimHalfW;
        var aboveRim = bcy < rimY - 5;
        var belowRim = bcy > rimY + 5;
        var movingDown = bs.vy > 1;

        if (inRimX && aboveRim) {
            ballWasAboveRim = true;
        }

        if (ballWasAboveRim && inRimX && belowRim && movingDown) {
            score++;
            scoreDisplay.textContent = score;
            scoreboard.classList.add('visible');
            scoreCooldown = true;
            ballWasAboveRim = false;

            showScoreFlash(
                hs.x + hoop.offsetWidth / 2 - 15,
                hs.y - 10
            );

            setTimeout(function () { scoreCooldown = false; }, 1000);
        }

        /* reset if ball leaves rim X zone */
        if (!inRimX) ballWasAboveRim = false;
    }

    /* ── animation constants ── */
    var FRICTION      = 0.985;
    var BOUNCE        = -0.5;
    var IDLE_DRIFT    = 0.008;
    var HOOP_DRIFT    = 0.002;
    var BALL_GRAVITY  = 0.28;
    var BALL_FRICTION = 0.992;
    var BALL_BOUNCE_Y = -0.62;
    var BALL_BOUNCE_X = -0.45;
    var FLOOR_DRAG    = 0.96;

    function tick() {
        var aw = arena.clientWidth;
        var ah = arena.clientHeight;

        state.forEach(function (s, i) {
            var el = floaters[i];
            var ew = el.offsetWidth;
            var eh = el.offsetHeight;

            if (s.dragging) {
                el.style.left = s.x + 'px';
                el.style.top  = s.y + 'px';
                return;
            }

            /* ─── BASKETBALL: real gravity physics ─── */
            if (s.isBall) {
                s.vy += BALL_GRAVITY;
                s.vx *= BALL_FRICTION;
                s.vy *= BALL_FRICTION;
                s.x += s.vx;
                s.y += s.vy;

                /* floor */
                if (s.y + eh > ah) {
                    s.y = ah - eh;
                    s.vy *= BALL_BOUNCE_Y;
                    s.vx *= FLOOR_DRAG;
                    /* kill tiny bounces */
                    if (Math.abs(s.vy) < 1) s.vy = 0;
                }
                /* ceiling */
                if (s.y < 0) {
                    s.y = 0;
                    s.vy *= BALL_BOUNCE_Y;
                }
                /* walls */
                if (s.x < 0)       { s.x = 0;       s.vx *= BALL_BOUNCE_X; }
                if (s.x + ew > aw) { s.x = aw - ew; s.vx *= BALL_BOUNCE_X; }

            /* ─── HOOP: very slow drift ─── */
            } else if (s.isHoop) {
                var speed = Math.hypot(s.vx, s.vy);
                if (speed < 0.06) {
                    s.vx += (Math.random() - 0.5) * HOOP_DRIFT;
                    s.vy += (Math.random() - 0.5) * HOOP_DRIFT;
                }
                if (speed > 0.3) { s.vx *= 0.92; s.vy *= 0.92; }

                s.vx *= FRICTION;
                s.vy *= FRICTION;
                s.x += s.vx;
                s.y += s.vy;

                if (s.x < 0)       { s.x = 0;       s.vx *= BOUNCE; }
                if (s.x + ew > aw) { s.x = aw - ew; s.vx *= BOUNCE; }
                if (s.y < 0)       { s.y = 0;        s.vy *= BOUNCE; }
                if (s.y + eh > ah) { s.y = ah - eh;  s.vy *= BOUNCE; }

            /* ─── EVERYTHING ELSE: space float ─── */
            } else {
                var spd = Math.hypot(s.vx, s.vy);
                if (spd < 0.15) {
                    s.vx += (Math.random() - 0.5) * IDLE_DRIFT;
                    s.vy += (Math.random() - 0.5) * IDLE_DRIFT;
                }

                s.vx *= FRICTION;
                s.vy *= FRICTION;
                s.x += s.vx;
                s.y += s.vy;

                if (s.x < 0)       { s.x = 0;       s.vx *= BOUNCE; }
                if (s.x + ew > aw) { s.x = aw - ew; s.vx *= BOUNCE; }
                if (s.y < 0)       { s.y = 0;        s.vy *= BOUNCE; }
                if (s.y + eh > ah) { s.y = ah - eh;  s.vy *= BOUNCE; }
            }

            el.style.left = s.x + 'px';
            el.style.top  = s.y + 'px';
        });

        checkScore();
        requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
    window.addEventListener('resize', initPositions);
})();
</script>
{% endblock %}
