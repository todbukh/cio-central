{# Used example code from bootstrap docs as a base: https://getbootstrap.com/docs/5.3/components/navbar/ #}
{% extends 'base-no-nav.html' %}

{% block navbar %}
    <nav class="navbar navbar-expand-lg bg-body-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CIO Central</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {% if user.is_exec and user.status == "APPROVED" %}
                <li class="nav-item">
                    <a class="btn btn-outline-info" href="{% url 'exec_panel:executive_redirect' %}">Exec Panel</a>
                </li>
                {% endif %}
            </ul>
            <form method="post" action="/accounts/logout/">
                {% csrf_token %}
                <button class="btn btn-outline-danger" type="submit">
                    Logout
                </button>
            </form>
        </div>
        </div>
    </nav>
{% endblock %}
