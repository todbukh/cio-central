{% extends 'base-no-nav.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="d-flex justify-content-center align-items-center px-3" style="min-height: 80vh;">
    <div class="card shadow w-100" style="max-width: 420px;">
        <div class="card-body p-3 p-sm-4">
            <h2 class="card-title text-center mb-2">Sign Up</h2>
            <p class="text-center text-muted mb-4">{{ form.initial.email }}</p>
            <form method="post" action="{% url 'socialaccount_signup' %}" autocomplete="off">
                {% csrf_token %}
                {% bootstrap_form form %}
                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
