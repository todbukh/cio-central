{# generated by Claude Sonnet 4.6 #}

<header class="px-4 py-3 border-bottom d-flex align-items-center justify-content-between gap-2">
  <div class="d-flex align-items-center gap-2">
    <i class="bi bi-calendar-event fs-5 text-body-secondary"></i>
    <h2 class="h6 fw-semibold text-body mb-0">Upcoming Events</h2>
  </div>
  <span class="badge text-bg-warning">
    <i class="bi bi-tools me-1"></i>Coming Soon
  </span>
</header>

<div class="flex-grow-1 overflow-y-auto px-3 py-3 d-flex flex-column gap-3">
  {% for _ in "123" %}
  <div class="rounded border bg-body p-3 d-flex gap-3">
    <div class="flex-shrink-0 d-flex flex-column align-items-center justify-content-center rounded bg-primary-subtle border border-info-subtle text-center px-2 py-1" style="min-width: 3rem;">
      <span class="text-primary small fw-bold text-uppercase" style="font-size: .65rem;">Month</span>
      <span class="text-primary fw-bold lh-1" style="font-size: 1.25rem;">--</span>
    </div>
    <div class="overflow-hidden">
      <p class="fw-semibold text-body mb-1 text-truncate">Event title placeholder</p>
      <p class="text-body-secondary small mb-1">
        <i class="bi bi-clock me-1"></i>00:00 – 00:00
      </p>
      <p class="text-body-secondary small mb-0 text-truncate">
        <i class="bi bi-geo-alt me-1"></i>Location or virtual link
      </p>
    </div>
  </div>
  {% endfor %}
</div>

{% if user.is_exec %}
<div class="px-4 py-3 border-top">
  <button class="btn btn-outline-primary btn-sm w-100">
    <i class="bi bi-calendar-plus me-1"></i>Create Event
  </button>
  <p class="text-body-secondary small mb-0 mt-2 text-center">
    <i class="bi bi-info-circle me-1"></i>
    Event management is under development.
  </p>
</div>
{% endif %}
