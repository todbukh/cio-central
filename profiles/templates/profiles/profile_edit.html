{% extends 'base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="container py-5">

  <div class="bg-body-secondary rounded p-4 mx-auto" style="max-width: 600px;">
    <h4 class="text-body mb-4">
      <i class="bi bi-pencil-square me-2"></i>Edit Profile
    </h4>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_bio" class="form-label text-body">About Me</label>
        <textarea name="bio" id="id_bio" class="form-control bg-body text-body" rows="4">{{ form.bio.value|default:'' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'profiles:profile' username=request.user.username %}" class="btn btn-outline-primary">Cancel</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
