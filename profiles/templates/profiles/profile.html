{% extends 'base.html' %}

{% block title %}{{ profile_user.username }}'s Profile{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<div class="container py-5">

  <!-- Top bar -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <a href="/" class="btn btn-outline-primary">
      <i class="bi bi-arrow-left"></i> Home
    </a>
    {% if is_owner %}
      <a href="{% url 'profiles:profile_edit' username=profile_user.username %}" class="btn btn-outline-info" title="Edit Profile">
        <i class="bi bi-pencil-square"></i> Edit Profile
      </a>
    {% endif %}
  </div>

  <!-- Profile picture and username -->
  <div class="text-center mb-4">
    <img src="https://placehold.co/120x120" alt="Profile picture" class="rounded-circle mb-3">
    <h2 class="text-body">{{ profile_user.username }}</h2>
  </div>

  <!-- Bio section -->
  <div class="bg-body-secondary rounded p-4 mx-auto" style="max-width: 600px;">
    <h5 class="text-body mb-2">
      <i class="bi bi-person-lines-fill me-2"></i>About Me
    </h5>
    <p class="text-body-secondary mb-0">{{ profile_user.profile.bio }}</p>
  </div>

</div>
{% endblock %}
