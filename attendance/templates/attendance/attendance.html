{% extends 'exec_panel/executive-base.html' %}

{% block tab %}
    <div class="container py-4">

      <div class="mb-4">
        <h3>Attendance</h3>
        <p class="text-body-secondary mb-0">Select an event to manage member attendance.</p>
      </div>

      {% if events %}
        <div class="row g-3">
          {% for event in events %}
            <div class="col-12 col-md-6 col-lg-4">
              <a href="{% url 'exec_panel:attendance:event_attendance' event.id %}"
                 class="text-decoration-none">
                <div class="bg-body-secondary border rounded p-3 h-100 d-flex flex-column gap-2">
                  <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-calendar-event text-primary"></i>
                    <span class="text-body fw-semibold">{{ event.name }}</span>
                  </div>
                  <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-clock text-body-secondary"></i>
                    <span class="text-body-secondary small">{{ event.date }}</span>
                  </div>
                  <div class="mt-auto pt-2">
                    <span class="text-primary small">
                      View attendance <i class="bi bi-arrow-right"></i>
                    </span>
                  </div>
                </div>
              </a>
            </div>
          {% endfor %}
        </div>
      {% else %}
        <div class="bg-body-secondary rounded p-5 text-center">
          <i class="bi bi-calendar-x fs-1 text-body-secondary d-block mb-3"></i>
          <p class="text-body-secondary mb-0">No events found.</p>
        </div>
      {% endif %}

    </div>
{% endblock %}
